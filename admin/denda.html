<!DOCTYPE html>
<html lang='id'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Data Denda - LibraFlow Admin</title>
    <link rel='stylesheet' href='../assets/css/style.css'>
    <script src='../assets/js/mock-db.js'></script>
</head>
<body>
<script>
    // Auth Check
    const currentUser = db.checkAuth('admin');
</script>
<div class='dashboard'>
    <div class='sidebar'>
        <div class='logo'> LibraFlow</div>
        <div class='sidebar-menu'>
            <a href='dashboard.html'> Dashboard</a>
            <a href='buku.html'> Buku</a>
            <a href='kategori.html'> Kategori</a>
            <a href='peminjaman.html'> Peminjaman</a>
            <a href='users.html'> Users</a>
            <a href='denda.html' class='active'> Denda</a>
            <div class='sidebar-divider'></div>
            <a href='#' id='btn-logout'> Logout</a>
        </div>
    </div>
    <div class='main-content'>
        <div class='page-header'>
            <h2>Data Denda</h2>
        </div>

        <div id="success-alert" class="alert alert-success" style="display: none; margin-bottom: 20px;"></div>

        <div class='card'>
            <table>
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Nama</th>
                        <th>Buku</th>
                        <th>Jumlah Hari</th>
                        <th>Denda/Hari</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Tgl Bayar</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id='denda-table-body'>
                    <!-- Dynamic -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        // Logout handler
        document.getElementById('btn-logout').addEventListener('click', function(e) {
            e.preventDefault();
            db.logout();
            window.location.href = '../login.html';
        });

        renderDendaTable();
    });

    function renderDendaTable() {
        const fines = db.getFines();
        const loans = db.getLoans();
        const users = db.getUsers();
        const tbody = document.getElementById('denda-table-body');
        tbody.innerHTML = '';

        // Order by fine id DESC
        const sortedFines = [...fines].sort((a, b) => b.id - a.id);

        if (sortedFines.length === 0) {
            tbody.innerHTML = `<tr><td colspan="8" style="text-align: center;">Tidak ada data denda.</td></tr>`;
            return;
        }

        sortedFines.forEach((fine, idx) => {
            const loan = loans.find(l => l.id == fine.peminjaman_id);
            const borrower = loan ? users.find(u => u.id == loan.user_id) : null;
            const borrowerName = borrower ? borrower.name : "Unknown";
            const book = loan ? db.getBook(loan.buku_id) : null;
            const bookTitle = book ? book.judul : "Unknown";

            const tr = document.createElement('tr');
            
            let badgeClass = 'badge-red';
            let statusLabel = 'Belum Bayar';
            if (fine.status === 'lunas') {
                badgeClass = 'badge-green';
                statusLabel = 'Lunas';
            }

            tr.innerHTML = `
                <td>${idx + 1}</td>
                <td>${borrowerName}</td>
                <td>${bookTitle}</td>
                <td>${fine.jumlah_hari}</td>
                <td>Rp ${fine.denda_harian.toLocaleString('id-ID')}</td>
                <td>Rp ${fine.total.toLocaleString('id-ID')}</td>
                <td><span class='${badgeClass}'>${statusLabel}</span></td>
                <td>${fine.tgl_bayar || '-'}</td>
                <td>
                    ${fine.status === 'belum_bayar' ? 
                        `<button onclick='payFine(${fine.id})' class='btn-primary btn-kecil' style='border: none; cursor: pointer;'>Bayar</button>` : 
                        '-'
                    }
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function payFine(id) {
        if (confirm('Konfirmasi pembayaran denda ini?')) {
            db.payFine(id);
            const successAlert = document.getElementById("success-alert");
            successAlert.textContent = "Denda berhasil dibayar!";
            successAlert.style.display = "block";
            renderDendaTable();
            setTimeout(() => { successAlert.style.display = "none"; }, 3000);
        }
    }
</script>
</body>
</html>
