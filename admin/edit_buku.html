<!DOCTYPE html>
<html lang='id'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Edit Buku - LibraFlow Admin</title>
    <link rel='stylesheet' href='../assets/css/style.css'>
    <script src='../assets/js/mock-db.js'></script>
</head>
<body>
<script>
    // Auth Check
    const currentUser = db.checkAuth('admin');
</script>
<div class='dashboard'>
    <div class='sidebar'>
        <div class='logo'>📚 LibraFlow</div>
        <div class='sidebar-menu'>
            <a href='dashboard.html'>📊 Dashboard</a>
            <a href='buku.html' class='active'>📚 Buku</a>
            <a href='kategori.html'>📂 Kategori</a>
            <a href='peminjaman.html'>📋 Peminjaman</a>
            <a href='users.html'>👥 Users</a>
            <a href='denda.html'>💰 Denda</a>
            <div class='sidebar-divider'></div>
            <a href='#' id='btn-logout'>🚪 Logout</a>
        </div>
    </div>
    <div class='main-content'>
        <div class='page-header'>
            <h2>Edit Buku</h2>
        </div>

        <div class='card'>
            <form id="edit-buku-form">
                <input type='hidden' id='buku_id'>
                <div class='form-group'>
                    <label>Judul</label>
                    <input type='text' id='judul' required>
                </div>
                <div class='form-group'>
                    <label>Penulis</label>
                    <input type='text' id='penulis' required>
                </div>
                <div class='form-group'>
                    <label>Penerbit</label>
                    <input type='text' id='penerbit' required>
                </div>
                <div class='form-group'>
                    <label>Tahun Terbit</label>
                    <input type='number' id='tahun_terbit' required>
                </div>
                <div class='form-group'>
                    <label>Stok</label>
                    <input type='number' id='stok' required>
                </div>
                <div class='form-group'>
                    <label>Kategori</label>
                    <select id='kategori_id' required>
                        <!-- Dynamic -->
                    </select>
                </div>
                <button type='submit' class='btn-primary' style='border: none; cursor: pointer; padding: 10px 20px; border-radius: 5px;'>Simpan</button>
                <a href='buku.html' class='btn-danger' style='text-decoration: none; padding: 10px 20px; border-radius: 5px; margin-left: 8px;'>Kembali</a>
            </form>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        // Logout handler
        document.getElementById('btn-logout').addEventListener('click', function(e) {
            e.preventDefault();
            db.logout();
            window.location.href = '../login.html';
        });

        // Load Categories
        const categories = db.getCategories();
        const select = document.getElementById('kategori_id');
        categories.forEach(cat => {
            const opt = document.createElement('option');
            opt.value = cat.id;
            opt.textContent = cat.nama;
            select.appendChild(opt);
        });

        // Load Book details
        const urlParams = new URLSearchParams(window.location.search);
        const bookId = parseInt(urlParams.get('id'));
        const book = db.getBook(bookId);

        if (!book) {
            window.location.href = 'buku.html';
            return;
        }

        document.getElementById('buku_id').value = book.id;
        document.getElementById('judul').value = book.judul;
        document.getElementById('penulis').value = book.penulis;
        document.getElementById('penerbit').value = book.penerbit;
        document.getElementById('tahun_terbit').value = book.tahun_terbit;
        document.getElementById('stok').value = book.stok;
        document.getElementById('kategori_id').value = book.kategori_id;

        // Form Submit
        document.getElementById('edit-buku-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const id = parseInt(document.getElementById('buku_id').value);
            const updatedBook = {
                judul: document.getElementById('judul').value,
                penulis: document.getElementById('penulis').value,
                penerbit: document.getElementById('penerbit').value,
                tahun_terbit: parseInt(document.getElementById('tahun_terbit').value),
                stok: parseInt(document.getElementById('stok').value),
                kategori_id: parseInt(document.getElementById('kategori_id').value)
            };

            db.updateBook(id, updatedBook);
            window.location.href = 'buku.html?pesan=Buku berhasil diupdate';
        });
    });
</script>
</body>
</html>
