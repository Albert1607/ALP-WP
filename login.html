<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LibraFlow</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="assets/js/mock-db.js"></script>
</head>
<body>

<div class="auth-container">
    <div class="auth-box">
        <div class="auth-header">
            <a href="index.html" class="logo"> LibraFlow</a>
            <h2>Masuk</h2>
            <p>Masuk ke akun kamu untuk meminjam buku</p>
        </div>

        <div id="error-alert" class="alert alert-error" style="display: none;"></div>

        <form id="login-form">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required placeholder="contoh@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="Masukkan password">
            </div>
            <button type="submit" class="btn btn-primary btn-besar w-full">Masuk</button>
        </form>

        <p class="auth-footer">Belum punya akun? <a href="register.html">Daftar di sini</a></p>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        // Redirect if already logged in
        const currentUser = db.getCurrentUser();
        if (currentUser) {
            window.location.href = currentUser.role === 'admin' ? 'admin/dashboard.html' : 'member/dashboard.html';
        }

        const form = document.getElementById("login-form");
        const errorAlert = document.getElementById("error-alert");

        form.addEventListener("submit", function(e) {
            e.preventDefault();
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            const user = db.login(email, password);
            if (user) {
                if (user.role === 'admin') {
                    window.location.href = "admin/dashboard.html";
                } else {
                    window.location.href = "member/dashboard.html";
                }
            } else {
                errorAlert.textContent = "Email atau Password salah! (Gunakan: admin@libraflow.com / admin atau albert@gmail.com / password)";
                errorAlert.style.display = "block";
            }
        });
    });
</script>
</body>
</html>
